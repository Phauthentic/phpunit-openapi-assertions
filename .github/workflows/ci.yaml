name: CI

on: [push, pull_request]

jobs:
  testsuite:
    name: Unittests
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        phpunit-version: ['10', '11', '12']
        exclude:
          # PHPUnit 11 requires PHP 8.2+
          - php-version: '8.1'
            phpunit-version: '11'
          # PHPUnit 12 requires PHP 8.3+
          - php-version: '8.1'
            phpunit-version: '12'
          - php-version: '8.2'
            phpunit-version: '12'
          # PHPUnit 10 is not compatible with PHP 8.5
          - php-version: '8.5'
            phpunit-version: '10'

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, fileinfo
          tools: pecl
          coverage: pcov

      - name: Install dependencies with PHPUnit ${{ matrix.phpunit-version }}
        run: |
          composer require --dev phpunit/phpunit:^${{ matrix.phpunit-version }}.0 --no-update
          composer update --no-interaction --prefer-dist

      - name: Determine PHPUnit config
        id: phpunit-config
        run: |
          if [[ "${{ matrix.phpunit-version }}" == "10" ]]; then
            echo "config=phpunit10.xml" >> $GITHUB_OUTPUT
          else
            echo "config=phpunit.xml" >> $GITHUB_OUTPUT
          fi

      - name: Run PHPUnit
        run: |
          if [[ ${{ matrix.php-version }} == '8.3' && ${{ matrix.phpunit-version }} == '11' ]]; then
            bin/phpunit --configuration ${{ steps.phpunit-config.outputs.config }} --coverage-clover=coverage.xml
          else
            bin/phpunit --configuration ${{ steps.phpunit-config.outputs.config }}
          fi

      - name: Code Coverage Report
        if: success() && matrix.php-version == '8.3' && matrix.phpunit-version == '11'
        uses: codecov/codecov-action@v5

  code-analysis:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, fileinfo
          coverage: pcov
          tools: pecl

      - name: Composer install
        run: composer update --prefer-lowest --prefer-stable

      - name: Run phpcs
        run: bin/phpcs --version && bin/phpcs --report=source --standard=phpcs.xml

      - name: Run phpstan
        run: bin/phpstan -V && bin/phpstan --error-format=github

      - name: Run phpmd
        run: bin/phpmd --version && composer phpmd
