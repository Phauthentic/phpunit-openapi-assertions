name: CI

on: [push, pull_request]

jobs:
  testsuite:
    name: Unittests
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']
        phpunit-version: ['10', '11', '12']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, fileinfo
          tools: pecl
          coverage: pcov

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Install PHPUnit ${{ matrix.phpunit-version }}
        run: composer require --dev phpunit/phpunit:^${{ matrix.phpunit-version }}.0 --no-interaction

      - name: Run PHPUnit
        run: |
          if [[ ${{ matrix.php-version }} == '8.3' && ${{ matrix.phpunit-version }} == '11' ]]; then
            bin/phpunit --coverage-clover=coverage.xml
          else
            bin/phpunit
          fi
      - name: Code Coverage Report
        if: success() && matrix.php-version == '8.3' && matrix.phpunit-version == '11'
        uses: codecov/codecov-action@v4

  code-analysis:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, fileinfo
          coverage: pcov
          tools: pecl

      - name: Composer install
        run: composer update --prefer-lowest --prefer-stable

      - name: Run phpcs
        run: bin/phpcs --version && bin/phpcs --report=source --standard=phpcs.xml

      - name: Run phpstan
        run: bin/phpstan -V && bin/phpstan --error-format=github

      - name: Run phpmd
        run: bin/phpmd --version && composer phpmd
